<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Hesaplayıcı</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

h1{ text-align:center; color:#38bdf8; }

.lesson{
    background:#0f172a;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
}

.row{
    display:flex;
    gap:10px;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#334155;
    color:white;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 LGS Hesaplayıcı</h1>

<div id="app"></div>

<button onclick="hesapla()">Hesapla</button>

<div class="result">
<h2>Puan: <span id="puan">0</span></h2>
<div id="detay"></div>
</div>

</div>

<script>

/* =========================
   🎯 KATSAYILAR (BURADAN AYARLA)
   ========================= */
const KATSAYI = {
    turkce: 4,
    matematik: 4,
    fen: 4,
    sosyal: 1,
    din: 1,
    ingilizce: 1
};

/* =========================
   📚 DERSLER
   ========================= */
const dersler = [
    {id:"turkce", ad:"Türkçe", soru:20},
    {id:"matematik", ad:"Matematik", soru:20},
    {id:"fen", ad:"Fen", soru:20},
    {id:"sosyal", ad:"Sosyal", soru:10},
    {id:"din", ad:"Din", soru:10},
    {id:"ingilizce", ad:"İngilizce", soru:10}
];

/* =========================
   UI OLUŞTUR
   ========================= */
const app = document.getElementById("app");

dersler.forEach(d => {
    app.innerHTML += `
    <div class="lesson">
        <h3>${d.ad} (${d.soru})</h3>
        <div class="row">
            <input id="${d.id}_dogru" placeholder="Doğru">
            <input id="${d.id}_bos" placeholder="Boş">
        </div>
    </div>`;
});

/* =========================
   NET HESABI
   ========================= */
function netHesapla(dogru, bos, soru){
    let yanlis = soru - dogru - bos;
    return dogru - (yanlis / 3);
}

/* =========================
   HESAPLAMA
   ========================= */
function hesapla(){

    let toplam = 0;
    let max = 0;
    let detay = "";

    for(let d of dersler){

        let dogru = Number(document.getElementById(d.id+"_dogru").value || 0);
        let bos = Number(document.getElementById(d.id+"_bos").value || 0);

        if(dogru + bos > d.soru){
            alert(d.ad + " soru sayısını aşıyor!");
            return;
        }

        let net = netHesapla(dogru, bos, d.soru);

        let katsayi = KATSAYI[d.id];

        toplam += net * katsayi;
        max += d.soru * katsayi;

        detay += `${d.ad}: ${net.toFixed(2)} net<br>`;
    }

    let puan = 100 + (toplam / max) * 400;

    puan = Math.max(100, Math.min(500, puan));

    document.getElementById("puan").innerText = puan.toFixed(2);
    document.getElementById("detay").innerHTML = detay;
}

</script>

</body>
</html>
