<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Puan Hesaplayıcı</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:#1e293b;
    border-radius:24px;
    padding:25px;
    box-shadow:0 0 35px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#38bdf8;
}

.lesson{
    background:#0f172a;
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
}

.lesson h2{
    margin-bottom:12px;
    color:#4ade80;
    font-size:20px;
}

.row{
    display:flex;
    gap:10px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:#38bdf8;
    color:#0f172a;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:25px;
    background:#0f172a;
    padding:20px;
    border-radius:18px;
}

.score{
    text-align:center;
    font-size:52px;
    color:#4ade80;
    margin-top:10px;
    margin-bottom:15px;
}

.netler{
    line-height:1.9;
    color:#cbd5e1;
}

.warning{
    margin-top:15px;
    color:#f87171;
    text-align:center;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>📘 LGS Puan Hesaplayıcı</h1>

<div id="lessons"></div>

<button onclick="hesapla()">Puan Hesapla</button>

<div class="result">

<h2>Tahmini LGS Puanı</h2>

<div class="score" id="puan">0</div>

<div class="netler" id="netler"></div>

<div class="warning" id="warning"></div>

</div>

<div class="footer">
Modern GitHub.io Prototipi
</div>

</div>

<script>

const dersler = [
    {id:"tr", ad:"Türkçe", soru:20, katsayi:4},
    {id:"mat", ad:"Matematik", soru:20, katsayi:4},
    {id:"fen", ad:"Fen", soru:20, katsayi:4},
    {id:"sos", ad:"Sosyal", soru:10, katsayi:2},
    {id:"din", ad:"Din", soru:10, katsayi:1},
    {id:"ing", ad:"İngilizce", soru:10, katsayi:1}
];

const lessonsDiv = document.getElementById("lessons");

dersler.forEach(ders => {

    lessonsDiv.innerHTML += `
    
    <div class="lesson">

        <h2>${ders.ad} (${ders.soru} Soru)</h2>

        <div class="row">

            <input 
            type="number" 
            id="${ders.id}_dogru"
            placeholder="Doğru">

            <input 
            type="number" 
            id="${ders.id}_bos"
            placeholder="Boş">

        </div>

    </div>
    
    `;
});

function hesapla(){

    let toplamPuan = 0;
    let netYazdir = "";
    let hata = "";

    dersler.forEach(ders => {

        let dogru =
            Number(document.getElementById(`${ders.id}_dogru`).value);

        let bos =
            Number(document.getElementById(`${ders.id}_bos`).value);

        let yanlis =
            ders.soru - dogru - bos;

        if(
            dogru < 0 ||
            bos < 0 ||
            yanlis < 0
        ){
            hata = "Bazı değerler hatalı görünüyor.";
            return;
        }

        let net =
            dogru - (yanlis / 3);

        toplamPuan +=
            net * ders.katsayi;

        netYazdir += `
        ${ders.ad}: ${net.toFixed(2)} Net<br>
        `;
    });

    let puan =
        100 + (toplamPuan * 3.1);

    if(puan > 500){
        puan = 500;
    }

    if(puan < 100){
        puan = 100;
    }

    document.getElementById("puan").innerHTML =
        puan.toFixed(2);

    document.getElementById("netler").innerHTML =
        netYazdir;

    document.getElementById("warning").innerHTML =
        hata;
}

</script>

</body>
</html>
